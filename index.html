<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Egyptian Money Counter </title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- ملف التنسيقات الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="pro-card">
        <h1>
            <i class="fas fa-coins"></i>Money counter 
            <i class="fas fa-mobile-alt"></i>
        </h1>
        <div class="sub">عدادالنقودالمصرى</div>

        <!-- مجموعة أزرار الفئات -->
        <div class="denomination-panel">
            <div class="denom-title"><i class="fas fa-hand-pointer"></i> اختر الفئة:</div>
            <div class="denom-buttons" id="denomButtons">
                <button class="denom-btn active" data-value="200">200</button>
                <button class="denom-btn" data-value="100">100</button>
                <button class="denom-btn" data-value="50">50</button>
                <button class="denom-btn" data-value="20">20</button>
                <button class="denom-btn" data-value="10">10</button>
                <button class="denom-btn" data-value="5">5</button>
                <button class="denom-btn" data-value="1">1</button>
                <button class="denom-btn other-btn" data-value="other"><i class="fas fa-pen"></i> أخرى</button>
            </div>
        </div>

        <!-- حقل الفئة المخصصة (يظهر فقط عند اختيار "أخرى") -->
        <div class="custom-panel" id="customPanel" style="display: none;">
            <span><i class="fas fa-edit"></i> الفئة:</span>
            <input type="number" id="customDenom" min="1" step="1" placeholder="مثال 25">
        </div>

        <!-- حقل العدد وزر الإضافة -->
        <div class="input-row">
            <div class="count-field">
                <label><i class="fas fa-sort-numeric-up-alt"></i> عدد الأوراق</label>
                <input type="number" id="noteCount" min="1" value="1" step="1">
            </div>
            <div class="add-action">
                <button class="add-btn" id="addBtn"><i class="fas fa-plus-circle"></i> إضافة</button>
            </div>
        </div>

        <!-- جدول الإدخالات -->
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>الفئة</th><th>العدد</th><th>المجموع</th><th></th></tr>
                </thead>
                <tbody id="entriesBody"></tbody>
            </table>
        </div>

        <!-- إجمالي كبير -->
        <div class="grandtotal-area">
            <span class="grandtotal-label">الإجمالي</span>
            <span class="grandtotal-value" id="grandTotal">0</span>
        </div>

        <!-- زر إعادة الضبط -->
        <div style="display: flex; justify-content: center;">
            <button class="reset-button" id="resetBtn"><i class="fas fa-redo-alt"></i> إعادة ضبط</button>
        </div>

        <!-- توقيع المطور - رابط فيسبوك مع حقوق النشر 2026 -->
        <div class="footer">
            © 2026 تم التطوير بواسطة 
            <a href="https://www.facebook.com/eng.Kareem.ahmed.1" target="_blank" class="name-link">
                ENG Kareem Ahmed
            </a>
            . جميع الحقوق محفوظة.
        </div>
    </div>

    <!-- ملف الجافاسكريبت الخارجي -->
    <script src="script.js"></script>
</body>
</html>
